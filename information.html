<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <link rel="stylesheet" href="css/drive-styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.css" />
  <link rel="stylesheet" type="text/css" href="//cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css" />
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="shortcut icon" href="images/natk.jpg" type="image/x-icon">
  <title>НАТК - Производство и обслуживание авиационной техники</title>
</head>

<body>
  <div class="wrapper">
    <header class="header">
      <nav class="header__top">
        <div class="header__top-inner">
          <a class="header__logo logo" href="startpage.html">
            <img src="/images/logo.png" alt="logo">
            <span>НАТК</span>
          </a>
          <div class="header__nav">
            <button class="header__nav-toggle" id="nav-toggle"><span>Открыть Меню</span>☰</button>
            <ul class="header__nav-list">
              <li class="header__nav-op">
                <button class="header__nav-link" id="menu__op-button">Описание компетенции</button>
              </li>
              <li class="header__nav-mgpw">
                <button class="header__nav-link" id="menu-button">Методические указания к практическим заданиям</button>
              </li>
              <li class="header__nav-ctp">
                <button class="header__nav-link" id="menu__ctp-button">Календарно-тематическое планирование</button>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    
    <div class="file__ctp-content">
      <div class="file__ctp-title" id="file-title">
        Производство и обслуживание авиационной техники
        <span class="file__ctp-subtitle"></span>
      </div>
    </div>
    
    <div class="file__op-container">
      <div class="header__menu-op" id="file-menu-op">
        <span class="header__title">Описание компетенции</span>
        <div class="file-list"></div>
        <span class="header__title">Критерии-оценки</span>
        <div class="file-list"></div>
        <span class="header__title">Конкурсное задание</span>
        <div class="file-list"></div>
        <span class="header__title">Задание</span>
        <div class="file-list"></div>
      </div>
      <div id="fileViewerOp" class="file-viewer">
        <iframe id="fileFrameOp" src="" frameborder="0"></iframe>
      </div>
    </div>
    
    <div class="file__menu-container">
      <div class="header__menu-mdk" id="file-menu">
        <span class="header__title">МДК 02.01</span>
        <div class="file-list"></div>
        <span class="header__title">МДК 02.02</span>
        <div class="file-list"></div>
        <span class="header__title">МДК 02.03</span>
        <div class="file-list"></div>
      </div>
      <div id="fileViewer" class="file-viewer">
        <iframe id="fileFrame" src="" frameborder="0"></iframe>
      </div>
    </div>
    
    <div class="file__ctp-container">
      <div class="header__menu-ctp" id="file-menu-ctp">
        <span class="header__title">МДК 02.01 КТП</span>
        <div class="file-list"></div>
        <span class="header__title">МДК 02.02 КТП</span>
        <div class="file-list"></div>
        <span class="header__title">МДК 02.03 КТП</span>
        <div class="file-list"></div>
      </div>
      <div id="fileViewerCtp" class="file-viewer">
        <iframe id="fileFrameCtp" src="" frameborder="0"></iframe>
      </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@4.0/dist/fancybox.umd.js"></script>
    <script type="text/javascript" src="//cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>
    <script src="js/mixitup.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/drive-manager.js"></script>
    <script src="js/file-manager.js"></script>
  </div>
</body>
</html>
