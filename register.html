<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/authstyle.css">
    <link rel="shortcut icon" href="images/natk.jpg" type="image/x-icon">
    <title>Регистрация - НАТК</title>
    <style>
        .competences-group {
            margin: 15px 0;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #f9f9f9;
        }
        .competences-group label {
            display: flex;
            align-items: center;
            margin: 8px 0;
            cursor: pointer;
        }
        .competences-group input[type="checkbox"] {
            width: auto;
            margin-right: 10px;
        }
        .competences-group input[type="radio"] {
            width: auto;
            margin-right: 10px;
        }
        .help-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-header">
            <img src="images/logo.png" alt="NATK Logo" class="auth-logo">
            <h1>НАТК</h1>
            <h2>Регистрация в системе</h2>
        </div>
        
        <div class="auth-form-container">
            <form id="registerForm" class="auth-form">
                <h3>Создание аккаунта</h3>
                
                <div class="form-group">
                    <label for="regEmail">Электронная почта</label>
                    <input type="email" id="regEmail" name="email" required 
                        placeholder="user@example.com">
                </div>
                
                <div class="form-group">
                    <label for="regPassword">Пароль</label>
                    <input type="password" id="regPassword" name="password" required 
                        placeholder="Минимум 8 символов">
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Подтвердите пароль</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required 
                        placeholder="Повторите пароль">
                </div>
                
                <div class="form-group">
                    <label for="role">Роль</label>
                    <select id="role" name="role" required>
                        <option value="">Выберите роль</option>
                        <option value="student">Студент</option>
                        <option value="teacher">Преподаватель</option>
                    </select>
                </div>
                
                <!-- Блок выбора компетенций (появляется после выбора роли) -->
                <div id="competencesBlock" style="display: none;">
                    <div class="competences-group">
                        <label style="font-weight: bold; margin-bottom: 10px;">Выберите компетенции:</label>
                        <div id="competencesList"></div>
                        <div class="help-text" id="competencesHelpText"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" required>
                        <span>Я согласен с условиями использования системы</span>
                    </label>
                </div>
                
                <button type="submit" class="auth-btn">Зарегистрироваться</button>
                
                <div class="auth-links">
                    <a href="login.html">Уже есть аккаунт? Войти</a>
                    <a href="startpage.html">На главную</a>
                </div>
                
                <div id="registerMessage" class="message" style="display: none;"></div>
            </form>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
<script>
    // Список компетенций
    const competencesList = [
        { id: 1, name: 'Аддитивное производство', code: 'additive' },
        { id: 2, name: 'Технология машиностроения', code: 'technology' },
        { id: 3, name: 'Производство и обслуживание авиационной техники', code: 'information' },
        { id: 4, name: 'Медицинская оптика', code: 'optica' }
    ];

    const roleSelect = document.getElementById('role');
    const competencesBlock = document.getElementById('competencesBlock');
    const competencesListDiv = document.getElementById('competencesList');
    const competencesHelpText = document.getElementById('competencesHelpText');

    // При изменении роли показываем/скрываем блок компетенций
    roleSelect.addEventListener('change', function() {
        const role = this.value;
        if (role === 'student' || role === 'teacher') {
            competencesBlock.style.display = 'block';
            renderCompetences(role);
        } else {
            competencesBlock.style.display = 'none';
        }
    });

    // Рендерим список компетенций
    function renderCompetences(role) {
        if (role === 'student') {
            competencesHelpText.textContent = 'Студент может выбрать только одну компетенцию';
            competencesListDiv.innerHTML = competencesList.map(comp => `
                <label>
                    <input type="radio" name="competence" value="${comp.id}" data-code="${comp.code}">
                    <span>${comp.name}</span>
                </label>
            `).join('');
        } else {
            competencesHelpText.textContent = 'Преподаватель может выбрать несколько компетенций';
            competencesListDiv.innerHTML = competencesList.map(comp => `
                <label>
                    <input type="checkbox" name="competence" value="${comp.id}" data-code="${comp.code}">
                    <span>${comp.name}</span>
                </label>
            `).join('');
        }
    }

    // Перехватываем отправку формы и отправляем правильно
    const form = document.getElementById('registerForm');
    if (form) {
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Собираем данные правильно
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const role = document.getElementById('role').value;
            
            // Получаем выбранные компетенции
            const competenceInputs = document.querySelectorAll('input[name="competence"]:checked');
            const competenceIds = Array.from(competenceInputs).map(cb => parseInt(cb.value));
            
            // Валидация
            if (!email || !password || !confirmPassword || !role) {
                alert('Заполните все поля');
                return;
            }
            
            if (password !== confirmPassword) {
                alert('Пароли не совпадают');
                return;
            }
            
            if (password.length < 8) {
                alert('Пароль должен быть не менее 8 символов');
                return;
            }
            
            if (role === 'student' && competenceIds.length !== 1) {
                alert('Студент должен выбрать одну компетенцию');
                return;
            }
            
            if (role === 'teacher' && competenceIds.length === 0) {
                alert('Преподаватель должен выбрать хотя бы одну компетенцию');
                return;
            }
            
            const messageDiv = document.getElementById('registerMessage');
            messageDiv.style.display = 'block';
            messageDiv.className = 'message info';
            messageDiv.innerHTML = 'Регистрация...';
            
            try {
                const response = await fetch('http://localhost:3000/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email, 
                        password, 
                        role,
                        competenceIds 
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageDiv.className = 'message success';
                    messageDiv.innerHTML = '✅ ' + data.message + '<br>Через 3 секунды вы будете перенаправлены на страницу входа.';
                    form.reset();
                    setTimeout(() => { window.location.href = 'login.html'; }, 3000);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.innerHTML = '❌ ' + data.message;
                }
            } catch (error) {
                console.error('Ошибка:', error);
                messageDiv.className = 'message error';
                messageDiv.innerHTML = '❌ Ошибка соединения с сервером';
            }
        });
    }
</script>
</body>
</html>
