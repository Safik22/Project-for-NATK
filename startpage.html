<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/startstyle.css">
  <link rel="shortcut icon" href="images/natk.jpg" type="image/x-icon">
  <title>НАТК - Главная страница</title>
</head>

<body>
  <header class="header">
    <nav class="header__nav">
      <div class="header__nav-inner">
        <a class="header__logo logo" href="startpage.html">
          <img src="images/logo.png" alt="Логотип НАТК">
          <span>НАТК</span>
        </a>
        
        <div class="auth-buttons" id="authButtons"></div>
      </div>
    </nav>
  </header>
  
  <div class="button__compitation">
    <ul class="button__list">
      <li>
        <a class="button__block-additiv" href="additive.html">Аддитивное производство</a>
        <div class="teacher-actions" data-competence="additive"></div>
      </li>
      <li>
        <a class="button__block-techology" href="technology.html">Технология машиностроения</a>
        <div class="teacher-actions" data-competence="technology"></div>
      </li>
      <li>
        <a class="button__block-information" href="information.html">Производство и обслуживание авиационной техники</a>
        <div class="teacher-actions" data-competence="information"></div>
      </li>
      <li>
        <a class="button__block-optica" href="optica.html">Медицинская оптика</a>
        <div class="teacher-actions" data-competence="optica"></div>
      </li>
    </ul>
  </div>

  <div id="notificationContainer"></div>

  <script src="js/startpage.js"></script>
  <script>
    // Проверка роли и показ кнопок для преподавателей
    function checkTeacherRole() {
      const userStr = localStorage.getItem('natk_user');
      const token = localStorage.getItem('natk_token');
      
      if (!token || !userStr) return false;
      
      const user = JSON.parse(userStr);
      return user.role === 'teacher' || user.role === 'admin';
    }
    
    // Инициализация при загрузке
    document.addEventListener('DOMContentLoaded', function() {
      updateTeacherButtons();
      
      // Обновляем кнопки при изменении авторизации
      window.addEventListener('storage', function(event) {
        if (event.key === 'natk_token' || event.key === 'natk_user') {
          setTimeout(updateTeacherButtons, 100);
        }
      });
    });
    
    // Экспорт функций
    window.openDriveFolder = openDriveFolder;
    window.updateTeacherButtons = updateTeacherButtons;
  </script>
</body>

</html>
